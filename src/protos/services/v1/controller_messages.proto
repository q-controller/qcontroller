syntax = "proto3";

package services.v1;

import "settings/v1/settings.proto";
import "vm/statemachine/v1/statemachine.proto";
import "vm/runtime/v1/runtime.proto";

option go_package = "github.com/q-controller/qcontroller/src/generated/services/v1;v1";

message VMSpec {
    settings.v1.VM vm = 1;
    string image = 2;
    vm.statemachine.v1.CloudInit cloud_init = 3;
}

message CreateRequest {
    VMSpec spec = 1;
    string name = 2;
    bool start = 3;
    string node = 4;
}

message StartRequest {
    string name = 1;
}

message StopRequest {
    string name = 1;
    bool force = 2;
}

message VMResponse {
    string name = 1;
}

message InfoRequest {
    string name = 1;
}

message RemoveRequest {
    string name = 1;
}

message VMStatus {
    string state = 1;
    string hwaddr = 2;
    vm.runtime.v1.RuntimeInfo runtime_info = 3;
}

message Info {
    string name = 1;
    VMSpec spec = 2;
    VMStatus status = 3;
    string node = 4;
}

message InfoResponse {
    repeated Info info = 1;
}

message ListNodesResponse {
    repeated settings.v1.Node nodes = 1;
}
