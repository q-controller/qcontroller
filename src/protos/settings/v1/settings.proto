syntax = "proto3";

package settings.v1;

option go_package = "github.com/q-controller/qcontroller/src/generated/settings/v1;v1";

message TLSConfig {
    string ca = 1;
    string cert = 2;
    string key = 3;
}

message VM {
    uint32 cpus = 1;
    uint32 memory = 2;
    uint32 disk = 3;
}

message MemoryStats {
	uint64 total_memory = 1;
	uint64 available_memory = 2;
	uint64 free_memory = 3;
	uint64 disk_caches = 4;
}

message DiskStats {
    uint64 total_bytes = 1;
    uint64 used_bytes = 2;
}

message Cache {
    string root = 1;
}

message Dhcp {
    string start = 1;
    string end = 2;
    int64 lease_time = 4;
    string lease_file = 5;
}

message Dns {
    string zone = 1;
    oneof upstream {
        string resolv_conf = 2;
        StaticUpstreams static = 3;
    }
}

message StaticUpstreams {
    repeated string endpoints = 1;
}

message Network {
    string name = 1;
    string gateway_ip = 2;
    string bridge_ip = 3;
    Dhcp dhcp = 4;
    Dns dns = 5;
}

message LinuxSettings {
    Network network = 1;
}

message MacosSettings {
    enum Mode {
        MODE_UNSPECIFIED = 0;
        MODE_BRIDGED = 1;
        MODE_SHARED = 2;
    }

    message Bridged {
        string interface = 1;
    }

    message Shared {
        string subnet = 1;        // CIDR notation, e.g., "192.168.33.0/24"
        string start_address = 2; // Start of DHCP range, e.g., "192.168.33.1"
        string end_address = 3;   // End of DHCP range, e.g., "192.168.33.254"
    }

    Mode mode = 1;
    optional Bridged bridged = 2;
    optional Shared shared = 3;
    Dns dns = 4;
}

message Node {
    string name = 1;
    string endpoint = 2;
    string file_registry_endpoint = 3;
    string events_endpoint = 4;
    TLSConfig controller_tls = 5;
    TLSConfig file_registry_tls = 6;
    TLSConfig events_tls = 7;
}

message ControllerConfig {
    uint32 port = 1;
    string root = 2;
    Node local = 3;
    string events_endpoint = 4;
    TLSConfig tls = 5;
    TLSConfig qemu_tls = 6;
    TLSConfig events_tls = 7;
}

message QemuConfig {
    uint32 port = 1;
    Cache cache = 2;
    string root = 3;

    oneof platform_specific {
        LinuxSettings linux_settings = 4;
        MacosSettings macos_settings = 5;
    }

    string file_registry_endpoint = 6;
    TLSConfig tls = 7;
    TLSConfig file_registry_tls = 8;
}

message EventServiceConfig {
    uint32 port = 1;
    TLSConfig tls = 2;
}

message OrchestratorConfig {
    uint32 port = 1;
    repeated Node nodes = 3;
    string file_registry_endpoint = 4;
    bool expose_swagger_ui = 5;
    TLSConfig file_registry_tls = 6;
}

message FileRegistryConfig {
    uint32 port = 1;
    Cache cache = 2;
    string root = 3;
    string events_endpoint = 4;
    TLSConfig tls = 5;
    TLSConfig events_tls = 6;
}
