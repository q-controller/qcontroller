syntax = "proto3";

package settings.v1;

option go_package = "github.com/q-controller/qcontroller/src/generated/settings/v1;v1";

message VM {
    uint32 cpus = 1;
    uint32 memory = 2;
    uint32 disk = 3;
}

message MemoryStats {
	uint64 total_memory = 1;
	uint64 available_memory = 2;
	uint64 free_memory = 3;
	uint64 disk_caches = 4;
}

message Cache {
    string root = 1;
}

message Dhcp {
    string start = 1;
    string end = 2;
    repeated string dns = 3;
    int64 lease_time = 4;
    string lease_file = 5;
}

message Dns {
    string zone = 1;
    string resolv_conf = 2;
}

message Network {
    string name = 1;
    string gateway_ip = 2;
    string bridge_ip = 3;
    Dhcp dhcp = 4;
    Dns dns = 5;
}

message LinuxSettings {
    Network network = 1;
}

message MacosSettings {
    enum Mode {
        MODE_UNSPECIFIED = 0;
        MODE_BRIDGED = 1;
        MODE_SHARED = 2;
    }

    message Bridged {
        string interface = 1;
    }

    message Shared {
        string subnet = 1;        // CIDR notation, e.g., "192.168.33.0/24"
        string start_address = 2; // Start of DHCP range, e.g., "192.168.33.1"
        string end_address = 3;   // End of DHCP range, e.g., "192.168.33.254"
    }

    Mode mode = 1;
    optional Bridged bridged = 2;
    optional Shared shared = 3;
}

message ControllerConfig {
    uint32 port = 1;
    Cache cache = 2;
    string root = 3;
    string qemu_endpoint = 4;
}

message QemuConfig {
    uint32 port = 1;
    Cache cache = 2;
    string root = 3;

    oneof platform_specific {
        LinuxSettings linux_settings = 4;
        MacosSettings macos_settings = 5;
    }
}

message GatewayConfig {
    uint32 port = 1;
    string controller_endpoint = 2;
    bool expose_swagger_ui = 3;
}
