syntax = "proto3";

package services.process.v1;

import "settings/v1/settings.proto";
import "vm/statemachine/v1/statemachine.proto";
import "vm/runtime/v1/runtime.proto";

option go_package = "github.com/q-controller/qcontroller/src/generated/services/process/v1;v1";

message NetworkConfig {
    string driver = 1;
    string mac = 2;
}

message QemuConfig {
    string id = 1;
    string machine = 2;
    string accelerator = 3;
    NetworkConfig network = 4;
    string image_id = 5;
    vm.statemachine.v1.CloudInit cloud_init = 6;
    settings.v1.VM hardware = 7;
}

message StartRequest {
    QemuConfig config = 1;
}

message StartResponse {
}

message StopRequest {
    string id = 1;
    bool force = 2;
}

message InfoRequest {
    repeated string ids = 1;
}

message InfoResponse {
    repeated vm.runtime.v1.RuntimeInfo info = 1;
}

message ListRequest {
}

message ListResponse {
    repeated string ids = 1;
}

message RemoveRequest {
    string id = 1;
}
