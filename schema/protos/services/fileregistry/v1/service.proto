syntax = "proto3";

package services.fileregistry.v1;

import "services/fileregistry/v1/messages.proto";

option go_package = "github.com/q-controller/qcontroller/src/generated/services/fileregistry/v1;v1";

service FileRegistryService {
    rpc UploadImage(stream UploadImageRequest) returns (UploadImageResponse) {}
    rpc DownloadImage(DownloadImageRequest) returns (stream DownloadImageResponse) {}
    rpc RemoveImage(RemoveImageRequest) returns (RemoveImageResponse) {}
    rpc ListImages(ListImagesRequest) returns (ListImagesResponse) {}
}
