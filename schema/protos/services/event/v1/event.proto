syntax = "proto3";

package services.event.v1;

import "services/event/v1/messages.proto";

option go_package = "github.com/q-controller/qcontroller/src/generated/services/event/v1;v1";

service EventService {
    rpc Publish(stream PublishRequest) returns (PublishResponse) {}
    rpc Subscribe(SubscribeRequest) returns (stream SubscribeResponse) {}
}
